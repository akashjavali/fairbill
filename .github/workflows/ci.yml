name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fairbill/utils test --run
      - run: pnpm --filter @fairbill/api test --run --reporter=verbose
        env:
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: apps/backend/api/coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fairbill
          POSTGRES_PASSWORD: fairbill_test
          POSTGRES_DB: fairbill_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run Prisma migrations
        working-directory: apps/backend/api
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fairbill:fairbill_test@localhost:5432/fairbill_test
      - name: Run integration tests
        working-directory: apps/backend/api
        run: pnpm test:integration --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://fairbill:fairbill_test@localhost:5432/fairbill_test
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_long
          AI_PROVIDER: openrouter
          OCR_PROVIDER: tesseract
          PAYMENT_PROVIDER: razorpay
          RAZORPAY_KEY_ID: test_key
          RAZORPAY_KEY_SECRET: test_secret
          UPLOAD_DIR: /tmp/fairbill-test-uploads
          CORS_ORIGIN: http://localhost:3000

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.fairbill.in
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
          retention-days: 1

  docker-build:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/api/Dockerfile
          push: false
          tags: fairbill-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
