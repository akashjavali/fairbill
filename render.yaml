services:
  - type: web
    name: fairbill-api
    runtime: docker
    dockerfilePath: ./apps/backend/api/Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: fairbill-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OCR_PROVIDER
        value: tesseract
      - key: PAYMENT_PROVIDER
        value: razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://fairbill.in
      - key: UPLOAD_DIR
        value: /tmp/fairbill-uploads

databases:
  - name: fairbill-db
    databaseName: fairbill
    user: fairbill
    plan: starter
    region: singapore
    postgresMajorVersion: 16
